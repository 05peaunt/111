name: FreeBSD Port CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  freebsd-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up FreeBSD VM
      uses: cross-platform-actions/action@v0.25.0
      with:
        operating_system: freebsd
        version: 13.2
        architecture: x86-64
        memory: 4G
        cpu_count: 2
        
    - name: Install dependencies
      run: |
        sudo pkg update
        sudo pkg install -y git
        sudo pkg install -y python py39-pip
        
    - name: Prepare port directory
      run: |
        sudo portsnap fetch extract
        sudo mkdir -p /usr/ports/www/py-django-jinja
        sudo cp -r ports/www/py-django-jinja/* /usr/ports/www/py-django-jinja/
        
    - name: Build port
      run: |
        cd /usr/ports/www/py-django-jinja
        make makesum
        make install clean
